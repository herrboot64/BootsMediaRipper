name: Secret Preflight

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  preflight:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run conservative secret preflight
        shell: pwsh
        run: ./tools/build-scripts/preflight-secret-check.ps1 -FailOnWarnings
